<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a56db" />
    <title>KYS Blood Connect Request Form</title>
    <link rel="stylesheet" href="../app.css" />
    <link rel="stylesheet" href="request.css" />
  </head>
  <body class="request-page">
    <main class="request-shell">
      <!-- Screen 1: Disclaimer -->
      <section id="screen-disclaimer" class="request-screen active">
        <div class="brand-banner hidden" data-brand-banner></div>
        <div class="request-hero">
          <p class="request-kicker" id="disclaimer-kicker"></p>
          <h1 id="disclaimer-title"></h1>
        </div>
        <section class="request-card">
          <p class="request-copy" id="disclaimer-intro"></p>
          <ul class="disclaimer-points" id="disclaimer-points"></ul>
          <label class="confirm-row">
            <input type="checkbox" id="disclaimer-agree" />
            <span id="disclaimer-agree-label"></span>
          </label>
          <button
            id="btn-disclaimer-continue"
            class="btn btn-primary btn-lg btn-block"
            disabled
          ></button>
        </section>
      </section>

      <!-- Screen 2: Form -->
      <section id="screen-form" class="request-screen">
        <div class="brand-banner hidden" data-brand-banner></div>
        <div class="request-hero">
          <p class="request-kicker">Public Intake</p>
          <h1>Request Blood Assistance from KYS</h1>
          <div class="request-warning">
            <strong>Important:</strong> Submit this form only once per
            requirement.
          </div>
        </div>
        <section class="request-card">
          <div id="formContainer"></div>
        </section>
      </section>

      <!-- Screen 3: Success / next steps -->
      <section id="screen-success" class="request-screen">
        <div class="brand-banner hidden" data-brand-banner></div>
        <div class="request-hero">
          <p class="request-kicker">Submitted</p>
          <h1 id="success-title"></h1>
        </div>
        <section class="request-card">
          <p class="request-copy" id="success-message"></p>
          <ul class="disclaimer-points" id="success-steps"></ul>
          <p class="request-meta" id="success-support-note"></p>
          <p class="request-meta" id="success-reference"></p>
          <br>
          <button
            id="btn-submit-another"
            class="btn btn-outline btn-lg btn-block"
          ></button>
        </section>
      </section>
    </main>

    <div id="request-toast" class="toast hidden"></div>

    <!-- requestRender.js must come first — it creates #request-form -->
    <script type="module" src="../branding.js"></script>
    <script type="module" src="requestRender.js"></script>
    <script type="module" src="request2.js"></script>
  </body>
</html>
